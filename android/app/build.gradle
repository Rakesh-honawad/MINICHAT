apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.minichat"

    defaultConfig {
        applicationId "com.minichat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    /* --------------------------------------------------------
       ✔ Set ALL Java/Kotlin to same version → 17
    -------------------------------------------------------- */
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

/* --------------------------------------------------------
   ✔ JVM Toolchain (React Native 0.75+ requirement)
-------------------------------------------------------- */
kotlin {
    jvmToolchain(17)
}

/* --------------------------------------------------------
   ✔ Ensure all Kotlin tasks use JVM 17
-------------------------------------------------------- */
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    /* Firebase */
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
}

/* --------------------------------------------------------
   ⭐ FORCE react-native-ble-advertiser TO USE SDK 36 & JAVA 17
-------------------------------------------------------- */
subprojects { subproject ->
    if (subproject.name.contains('react-native-ble-advertiser')) {
        subproject.afterEvaluate {
            if (subproject.plugins.hasPlugin('com.android.library')) {
                subproject.android {
                    compileSdkVersion 36

                    defaultConfig {
                        minSdkVersion 24
                        targetSdkVersion 36
                    }

                    compileOptions {
                        sourceCompatibility JavaVersion.VERSION_17
                        targetCompatibility JavaVersion.VERSION_17
                    }

                    if (subproject.hasProperty("kotlinOptions")) {
                        subproject.kotlinOptions {
                            jvmTarget = "17"
                        }
                    }
                }
            }
        }
    }
}
